# TradingJournalAnalyzer — 行为标签统一定义
# 这是前后端共享的单一真相来源，新增/修改标签只需改此文件
# 文件位置: <project_root>/pattern_definition.yaml

patterns:
  # ============================================================
  # 模块一：入场行为（依赖 a-stock-data 行情数据）
  # ============================================================
  - name: CHASE
    label: 追涨
    module: entry
    market_dependent: true
    confidence: 0.7
    rule:
      summary: 买入前5天涨幅>15%，且高于20日均线10%以上，且接近20日高点
      detail: entry_close vs 5d_ago_close > +15%, entry_close > ma20*1.10, entry_close >= max(prev_20d_high)*0.97
    description: 追涨买入，买入时股价已连续大幅上涨

  - name: BOTTOM
    label: 抄底
    module: entry
    market_dependent: true
    confidence: 0.7
    rule:
      summary: 买入前5天跌幅>15%，且均线空头排列(20MA<60MA)
      detail: entry_close vs 5d_ago_close < -15%, ma20 < ma60 at entry date
    description: 抄底买入，在下跌趋势中买入

  - name: BREAKOUT
    label: 突破
    module: entry
    market_dependent: true
    confidence: 0.7
    rule:
      summary: 买入日价格创20日新高，且成交量放大1.5倍以上
      detail: entry_close > max(prev_20d_high), entry_volume > avg_volume_20d * 1.5
    description: 突破买入，价格突破近期高点并伴随成交量放大

  - name: TREND
    label: 趋势
    module: entry
    market_dependent: true
    confidence: 0.7
    rule:
      summary: 买入时20MA>60MA且价格在20MA之上
      detail: ma20 > ma60 AND entry_close > ma20 at entry date
    description: 顺势交易，在均线多头排列且价格位于均线上方时入场

  - name: COUNTER_TREND
    label: 逆势
    module: entry
    market_dependent: true
    confidence: 0.7
    rule:
      summary: 买入时20MA<60MA且价格在20MA之下
      detail: ma20 < ma60 AND entry_close < ma20 at entry date
    description: 逆势交易，在均线空头排列且价格位于均线下方时入场

  - name: BREAKDOWN
    label: 破位
    module: entry
    market_dependent: true
    confidence: 0.7
    rule:
      summary: 卖出日价格创 20 日新低
      detail: exit_close < min(prev_20d_low)
    description: 破位离场，价格跌破近期低点时卖出

  # ============================================================
  # 模块二：持仓周期（不依赖行情数据）
  # ============================================================
  - name: SCALP
    label: 短线
    module: holding
    market_dependent: false
    confidence: 1.0
    rule:
      summary: 持仓 < 3 天
      detail: holding_days < 3
    description: 短线交易，持仓时间极短

  - name: SWING
    label: 波段
    module: holding
    market_dependent: false
    confidence: 1.0
    rule:
      summary: 持仓 3 ~ 30 天
      detail: 3 <= holding_days <= 30
    description: 波段交易，持仓数天至数周

  - name: POSITION
    label: 长持
    module: holding
    market_dependent: false
    confidence: 1.0
    rule:
      summary: 持仓 > 30 天
      detail: holding_days > 30
    description: 长期持有，持仓超过一个月

  # ============================================================
  # 模块三：仓位与风控行为（不依赖行情数据）
  # ============================================================
  - name: PYRAMID
    label: 加仓
    module: risk
    market_dependent: false
    confidence: 0.8
    rule:
      summary: 同一 symbol 在盈利状态下继续买入
      detail: same symbol & same entry_date & pnl_pct >= 0
    description: 金字塔加仓，在盈利头寸上追加仓位

  - name: AVERAGE_DOWN
    label: 补仓
    module: risk
    market_dependent: false
    confidence: 0.8
    rule:
      summary: 同一 symbol 以更低价格买入但仍亏损
      detail: same symbol & same entry_date & avg_entry_price < first_entry_avg & pnl_pct < 0
    description: 摊薄成本，在亏损头寸上追加仓位

  - name: TURN
    label: 做T
    module: risk
    market_dependent: false
    confidence: 0.7
    rule:
      summary: 同一 symbol 当日内既有买入也有卖出
      detail: raw trades show same-symbol same-date BUY and SELL, or entry_date == exit_date with sibling positions
    description: 日内回转交易，先买后卖或先卖后买

  - name: SMALL_LOSS_EXIT
    label: 小亏离场
    module: risk
    market_dependent: false
    is_outcome: true
    confidence: 0.6
    rule:
      summary: 跌幅 8% 以内且 10 天内卖出
      detail: -0.08 <= pnl_pct < 0 AND holding_days <= 10
    description: 小亏离场，亏损达到预定额度时卖出

  - name: QUICK_PROFIT
    label: 短线止盈
    module: risk
    market_dependent: false
    is_outcome: true
    confidence: 0.6
    rule:
      summary: 小盈利 < 5% 且持仓 < 5 天
      detail: 0 < pnl_pct < 0.05 AND holding_days < 5
    description: 快速止盈，小幅盈利后迅速离场

  - name: NORMAL_PROFIT
    label: 正常止盈
    module: risk
    market_dependent: false
    is_outcome: true
    confidence: 0.6
    rule:
      summary: 盈利 5% ~ 20%
      detail: 0.05 <= pnl_pct <= 0.20
    description: 正常止盈，达到预期盈利目标后离场

  - name: BIG_WIN
    label: 大赚
    module: risk
    market_dependent: false
    is_outcome: true
    confidence: 0.6
    rule:
      summary: 盈利 > 20%
      detail: pnl_pct > 0.20
    description: 大幅盈利，收益率超过 20%

  # ============================================================
  # 离场行为标签（不依赖行情数据）
  # ============================================================
  - name: TIGHT_STOP
    label: 止损
    module: exit
    market_dependent: false
    confidence: 0.8
    rule:
      summary: 跌幅 2%~5%，3 天内卖出
      detail: -0.05 <= pnl_pct <= -0.02 AND holding_days <= 3
    description: 严格止损，价格微幅下跌后迅速离场

  - name: TRAILING_STOP
    label: 移动止损
    module: exit
    market_dependent: false
    confidence: 0.6
    rule:
      summary: 持仓 > 10 天，盈利 0%~10%
      detail: holding_days > 10 AND 0 < pnl_pct <= 0.10
    description: 移动止损离场，持仓较久后微利退出

  - name: TIME_EXIT
    label: 时间止损
    module: exit
    market_dependent: false
    confidence: 0.6
    rule:
      summary: 持仓 > 30 天，盈亏 < 5%
      detail: holding_days > 30 AND abs(pnl_pct) < 0.05
    description: 时间止损，持仓过久后因时间成本离场

  - name: LARGE_LOSS_EXIT
    label: 大幅亏损离场
    module: exit
    market_dependent: false
    confidence: 0.9
    rule:
      summary: 亏损 > 20%
      detail: pnl_pct < -0.20
    description: 恐慌性离场，出现大幅亏损后卖出

  # ============================================================
  # Phase 3 — 入场行为（依赖 a-stock-data 行情数据）
  # ============================================================
  - name: FOMO
    label: 害怕错过
    module: entry
    market_dependent: true
    confidence: 0.7
    rule:
      summary: 连续上涨后追高买入（接近日内高点）
      detail: 5日内>=3天上涨, 且买入价接近日内高点(>=high*0.98)
    description: 害怕错过上涨，在连续上涨后追高买入

  # ============================================================
  # Phase 4 — 心理行为标签（AI推测层，不出现在硬标签中）
  # ============================================================
  - name: PSY_FOMO
    label: 害怕错过（心理）
    module: risk
    market_dependent: false
    is_psychological: true
    confidence: 0.3
    rule:
      summary: 连续买入价上涨（基于交易记录）
      detail: 3笔以上连续买单价格递增
    description: 基于交易记录推测的害怕错过心理

  - name: POSSIBLE_REVENGE
    label: 可能报复交易
    module: risk
    market_dependent: false
    is_psychological: true
    confidence: 0.3
    rule:
      summary: 重大亏损后 24 小时内开新仓且仓位更大
      detail: prior_loss > avg_loss*1.5 AND gap <= 1d AND qty > prior_qty
    description: 大幅亏损后急于翻本，开仓量增大

  - name: OVERTRADING
    label: 过度交易
    module: risk
    market_dependent: false
    is_psychological: true
    confidence: 0.5
    rule:
      summary: 单日交易次数超过个人均值+2个标准差且>=5次
      detail: daily_count > avg+2*std AND daily_count >= 5
    description: 单日交易频率远高于个人平均水平

  - name: HOLD_LOSER
    label: 死扛亏损
    module: risk
    market_dependent: false
    is_psychological: true
    confidence: 0.5
    rule:
      summary: 亏损持仓时间显著长于盈利持仓
      detail: median_hold_losers > median_hold_winners * 1.5 AND pos.holding_days > median_hold_losers
    description: 亏损时不愿意止损，持仓时间远超盈利交易

  - name: CUT_WINNER
    label: 过早止盈
    module: risk
    market_dependent: false
    is_psychological: true
    confidence: 0.5
    rule:
      summary: 盈利持仓时间显著短于亏损持仓
      detail: median_hold_winners < median_hold_losers * 0.5 AND pos.holding_days < median_hold_winners
    description: 盈利时急于落袋为安，持仓时间远短于亏损交易
